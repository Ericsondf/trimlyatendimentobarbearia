<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Trimly — Barbearia Isaías Sousa</title>
  <meta name="description" content="Agende seu horário na Barbearia Isaías Sousa em menos de 1 minuto." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <div class="splash-logo">
        <svg class="splash-icon" width="56" height="56" viewBox="0 0 56 56" fill="none">
          <rect width="56" height="56" rx="16" fill="#5B4FD8"/>
          <path d="M16 14 L40 42" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <path d="M40 14 L16 42" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="16" cy="14" r="5" fill="white"/>
          <circle cx="40" cy="14" r="5" fill="white"/>
          <circle cx="16" cy="42" r="3.5" fill="rgba(255,255,255,0.5)"/>
          <circle cx="40" cy="42" r="3.5" fill="rgba(255,255,255,0.5)"/>
        </svg>
        <span class="splash-name">Trimly</span>
      </div>
      <p class="splash-by">Barbearia Isaías Sousa</p>
      <div class="splash-loader"><div class="loader-bar"></div></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <div class="header-logo">
          <svg width="28" height="28" viewBox="0 0 56 56" fill="none">
            <rect width="56" height="56" rx="14" fill="#5B4FD8"/>
            <path d="M16 14 L40 42" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M40 14 L16 42" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="16" cy="14" r="5" fill="white"/>
            <circle cx="40" cy="14" r="5" fill="white"/>
            <circle cx="16" cy="42" r="3.5" fill="rgba(255,255,255,0.5)"/>
            <circle cx="40" cy="42" r="3.5" fill="rgba(255,255,255,0.5)"/>
          </svg>
          <span>Trimly</span>
        </div>
      </div>
      <div class="header-shop">
        <span class="shop-dot"></span>
        Barbearia Isaías Sousa
      </div>
    </header>

    <!-- CHAT AREA -->
    <main class="chat-area" id="chat-area">
      <div class="messages" id="messages"></div>
    </main>

    <!-- INPUT AREA -->
    <div class="input-area" id="input-area"></div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
